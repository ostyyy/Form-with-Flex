<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Form</title>
</head>
<body>
    <div  class="container">
        <div class="header">
            <h1>CREATE AN ACCOUNT</h1>
            <p>
                We always keep your name and email address private.
            </p>            
        </div>


        <form>
            <div class="form-columns">
                <div class="column">
                    <input type="text" name="first-name" placeholder="First name" required>
                    <input type="text" name="display-name" placeholder="Display Name" required>
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="column">
                    <input type="text" name="last-name" placeholder="Last name" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <input type="password" name="conf-password" placeholder="Password Confirmation" required>
                </div>
            </div>

            <div class="account-type">
                <input type="radio" id="buyer" name="account-type" value="buyer">

                <div class="text">
                    <label for="buyer">Join As a Buyer</label>
                    <p>
                        I am looking for a Name, Logo or Tagline for my business, brand or product
                    </p>
                </div>
            </div>

            <div class="account-type">
                <input type="radio" name="account-type" id="seller" value="seller">

                <div class="text">
                    <label for="seller">Join As a Creative or Marketplace Seller</label>
                    <p>
                        I plan to submit name ideas, Logo designs or sell names in Domain Marketplace.
                    </p>                   
                </div>
            </div>

            <div class="offers-checkbox">
                <input type="checkbox" name="offers-checkbox" id="offers">
                <label for="offers">
                    Allow Squadhelp to send marketing/promotional offers from time to time
                </label>
            </div>

            <button class="create-btn" type="submit">Create account</button>
        </form>
    </div>

</body>
</html>
